services:
  korean-russian-audio-bot:
    build: .
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BUY_ME_A_COFFEE_URL: ${BUY_ME_A_COFFEE_URL:-}
      ACTIVE_CHAT_IDS: ${ACTIVE_CHAT_IDS:-}
      FREE_DAILY_LIMIT: ${FREE_DAILY_LIMIT:-3}
      DATA_DIR: /app/data
    volumes:
      - korean-russian-audio-bot-data:/app/data

volumes:
  korean-russian-audio-bot-data:
